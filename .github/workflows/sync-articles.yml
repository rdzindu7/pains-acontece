name: Sync Articles

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'js/core/config.js'
      - 'scripts/sync-articles.mjs'
      - '.github/workflows/sync-articles.yml'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync Supabase → articles.json
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node scripts/sync-articles.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/articles.json assets/images/articles/
          if git diff --staged --quiet; then
            echo "Nenhuma alteração em articles.json / imagens"
          else
            git commit -m "chore: sync artigos e imagens do Supabase [auto]"
            git push
          fi