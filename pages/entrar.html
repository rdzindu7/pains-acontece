<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<link rel="icon" type="image/jpeg" href="../assets/images/favicon.jpg"/>
<title>Entrar – Pains Acontece</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" href="../assets/css/pa-auth.css"/>
</head>
<body>
<div class="pa-auth-bg"></div>
<div class="pa-auth-bg-img"></div>
<div class="pa-auth-scan"></div>
<div class="pa-auth-particles" id="particles"></div>
<div class="pa-auth-page">
  <div class="pa-auth-card">
    <a href="../index.html" class="pa-auth-logo"><img src="../assets/images/pains-acontece-logo.png" alt="Pains Acontece"/></a>
    <h1 class="pa-auth-title">Entrar no Portal</h1>
    <p class="pa-auth-sub">Use sua conta Google para curtir, comentar, reagir às notícias e personalizar seu perfil.</p>
    <button type="button" class="pa-google-btn" id="btnGoogle">
      <span class="pa-google-g" aria-hidden="true"></span> Continuar com Google
    </button>
    <p class="pa-auth-err" id="errMsg"></p>
    <ul class="pa-auth-features">
      <li><i class="fas fa-check"></i> Edite seu perfil como quiser</li>
      <li><i class="fas fa-check"></i> Comente e reaja às publicações</li>
      <li><i class="fas fa-check"></i> Solicite o selo verificado</li>
    </ul>
    <div class="pa-auth-links">
      <a href="verificado.html">Selo Verificado</a>
      <a href="login.html">Área Admin</a>
    </div>
    <a href="../index.html" class="pa-auth-back"><i class="fas fa-arrow-left"></i> Voltar ao portal</a>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/core/config.js"></script>
<script src="../js/core/supabase-client.js"></script>
<script src="../js/ui/dialog.js?v=20260705v25"></script>
<script src="../js/core/social.js?v=20260705v25"></script>
<script>
(function(){
  const p = document.getElementById('particles');
  for (let i = 0; i < 18; i++) {
    const el = document.createElement('div');
    el.className = 'pa-auth-particle';
    const s = 2 + Math.random() * 4;
    el.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;animation-duration:${8+Math.random()*14}s;animation-delay:${Math.random()*8}s`;
    p.appendChild(el);
  }
})();
(async function(){
  const params = new URLSearchParams(location.search);
  const redirect = params.get('redirect') || '../index.html';
  const errEl = document.getElementById('errMsg');
  const btn = document.getElementById('btnGoogle');

  await PASocial.init();
  if (PASocial.isLoggedIn()) {
    location.href = redirect;
    return;
  }

  btn.addEventListener('click', async () => {
    btn.disabled = true;
    errEl.classList.remove('show');
    errEl.textContent = '';
    try {
      const res = await PASocial.signInWithGoogle();
      if (res.demo) location.href = redirect;
    } catch (e) {
      errEl.textContent = e.message || 'Não foi possível entrar. Tente novamente.';
      errEl.classList.add('show');
      btn.disabled = false;
    }
  });
})();
</script>
</body>
</html>
