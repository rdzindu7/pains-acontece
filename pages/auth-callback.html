<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="icon" type="image/jpeg" href="../assets/images/favicon.jpg"/>
<title>Autenticando… – Pains Acontece</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" href="../assets/css/pa-auth.css"/>
<style>
.pa-auth-spinner{width:48px;height:48px;border:3px solid rgba(255,255,255,.08);border-top-color:var(--g3);border-radius:50%;animation:spin .85s linear infinite;margin:0 auto 20px}
@keyframes spin{to{transform:rotate(360deg)}}
.pa-auth-status{text-align:center;font-size:.88rem;color:rgba(255,255,255,.55)}
.pa-auth-status strong{display:block;font-family:'Bebas Neue',sans-serif;letter-spacing:1.5px;font-size:1.2rem;color:var(--y);margin-bottom:8px}
</style>
</head>
<body>
<div class="pa-auth-bg"></div>
<div class="pa-auth-bg-img"></div>
<div class="pa-auth-scan"></div>
<div class="pa-auth-page">
  <div class="pa-auth-card" style="text-align:center;max-width:360px">
    <a href="../index.html" class="pa-auth-logo"><img src="../assets/images/pains-acontece-logo.png" alt=""/></a>
    <div class="pa-auth-spinner" id="spin"></div>
    <div class="pa-auth-status" id="msg">
      <strong>Quase lá!</strong>
      Conectando sua conta Google ao Pains Acontece…
    </div>
    <p class="pa-auth-err" id="err"></p>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/core/config.js"></script>
<script src="../js/core/supabase-client.js"></script>
<script src="../js/ui/dialog.js?v=20260705v25"></script>
<script src="../js/core/social.js?v=20260705v25"></script>
<script>
(async function(){
  const msg = document.getElementById('msg');
  const err = document.getElementById('err');
  const spin = document.getElementById('spin');
  const params = new URLSearchParams(location.search);
  const redirect = params.get('redirect') || '../index.html';

  try {
    PASupabase.init();
    await new Promise(r => setTimeout(r, 500));
    const session = await PASupabase.handleAuthCallback();
    if (!session) {
      await PASocial.init();
      if (PASocial.isLoggedIn()) {
        msg.innerHTML = '<strong>Pronto!</strong>Redirecionando…';
        setTimeout(() => location.replace(redirect), 500);
        return;
      }
      throw new Error('Sessão não encontrada. Tente entrar novamente.');
    }
    await PASocial.init();
    msg.innerHTML = '<strong>Bem-vindo!</strong>Redirecionando ao portal…';
    setTimeout(() => location.replace(redirect), 700);
  } catch (e) {
    spin.style.display = 'none';
    msg.innerHTML = '<strong>Falha na conexão</strong>Não foi possível completar o login.';
    err.textContent = e.message || '';
    err.classList.add('show');
    err.innerHTML += '<br><br><a href="entrar.html" style="color:var(--g3)">Tentar novamente</a>';
  }
})();
</script>
</body>
</html>
