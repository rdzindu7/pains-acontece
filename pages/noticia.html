<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<link rel="icon" type="image/jpeg" href="../assets/images/favicon.jpg"/>
<link rel="apple-touch-icon" href="../assets/images/favicon.jpg"/>
<title>Notícia – Pains Acontece</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#1d7a1d;--g2:#0d4d0d;--g3:#2ecc2e;
  --y:#c9a227;--y2:#f0d060;
  --k:#080808;--k2:#111;--k3:#1a1a1a;
  --w:#f2f2f2;--dim:#555;--muted:rgba(255,255,255,.45);
  --accent:var(--g);--accent-glow:rgba(29,122,29,.35);
  --ff-display:'Bebas Neue',sans-serif;
  --ff-serif:'Playfair Display',serif;
  --ff-body:'Inter',sans-serif;
  --ease:cubic-bezier(.16,1,.3,1);
}
html{overflow-x:hidden;-webkit-text-size-adjust:100%;text-size-adjust:100%;scroll-behavior:smooth}
body{background:var(--k);color:var(--w);font-family:var(--ff-body);line-height:1.7;overflow-x:hidden;min-height:100dvh;padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right)}
a{text-decoration:none;color:inherit}
img{display:block;max-width:100%}
#readProgress{position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,var(--accent),var(--y));z-index:200;box-shadow:0 0 12px var(--accent-glow);transition:width .12s}
.wrap{max-width:min(900px,100%);margin:0 auto;padding:0 clamp(12px,3vw,28px);width:100%}
.top-bar{background:rgba(8,8,8,.88);border-bottom:1px solid rgba(29,122,29,.2);padding:12px 0;position:sticky;top:0;z-index:100;backdrop-filter:blur(16px);padding-top:calc(12px + env(safe-area-inset-top))}
.top-inner{max-width:min(900px,100%);margin:0 auto;padding:0 clamp(12px,3vw,28px);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.top-inner img{height:38px;transition:transform .3s var(--ease)}
.top-inner a:first-child:hover img{transform:scale(1.04)}
.back{font-size:.76rem;color:var(--g3);display:flex;align-items:center;gap:8px;transition:color .2s,gap .2s}
.back:hover{color:var(--y);gap:10px}
.article{padding:0 0 80px}
.art-hero-wrap{position:relative;margin:0 calc(-1 * clamp(12px,3vw,28px)) 36px;overflow:hidden;border-radius:0 0 12px 12px}
.art-hero-wrap::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 30%,rgba(8,8,8,.75) 75%,var(--k) 100%);pointer-events:none}
.art-hero-wrap .hero-accent{position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--accent),var(--y),transparent);opacity:.8}
.hero-img,.hero-video{position:relative;border-radius:0;overflow:hidden;border:none;margin:0}
.hero-img img{width:100%;max-height:min(52vh,480px);object-fit:cover;animation:heroZoom 18s ease-in-out infinite alternate}
@keyframes heroZoom{from{transform:scale(1)}to{transform:scale(1.06)}}
.hero-video video{width:100%;max-height:min(52vh,520px);background:#000}
.art-header{padding-top:28px;animation:artSlideUp .7s var(--ease) both}
@keyframes artSlideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.art-breadcrumb{font-size:.68rem;color:rgba(255,255,255,.35);margin-bottom:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.art-breadcrumb a{color:var(--g3);transition:color .2s}.art-breadcrumb a:hover{color:var(--y)}
.cat{display:inline-block;background:rgba(29,122,29,.18);color:var(--g3);font-size:.62rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:6px 14px;border-radius:20px;margin-bottom:14px;border:1px solid rgba(29,122,29,.3);animation:artSlideUp .7s var(--ease) .05s both}
.title{font-family:var(--ff-serif);font-size:clamp(1.9rem,4.5vw,3rem);line-height:1.15;margin-bottom:18px;animation:artSlideUp .7s var(--ease) .1s both;background:linear-gradient(135deg,#fff 60%,rgba(255,255,255,.75));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.lead{font-size:1.12rem;color:var(--muted);margin-bottom:24px;line-height:1.65;border-left:3px solid var(--accent);padding-left:16px;animation:artSlideUp .7s var(--ease) .15s both}
.author-card{display:flex;align-items:center;gap:14px;padding:14px 16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:10px;margin-bottom:20px;animation:artSlideUp .7s var(--ease) .2s both}
.author-av{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--g2));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1rem;color:#fff;flex-shrink:0;box-shadow:0 4px 16px var(--accent-glow)}
.author-info strong{display:block;font-size:.88rem;color:#fff}
.author-info span{font-size:.72rem;color:var(--dim)}
.meta-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px;animation:artSlideUp .7s var(--ease) .25s both}
.meta-chip{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:20px;font-size:.72rem;color:rgba(255,255,255,.55);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);transition:border-color .2s,background .2s}
.meta-chip:hover{border-color:rgba(29,122,29,.35);background:rgba(29,122,29,.08)}
.meta-chip i{color:var(--g3);font-size:.68rem}
.meta-chip.verified{border-color:rgba(46,204,46,.3);color:var(--g3)}
.mode-tabs{display:flex;gap:8px;margin-bottom:28px;animation:artSlideUp .7s var(--ease) .3s both}
.mode-tab{padding:11px 20px;border-radius:24px;font-size:.7rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:rgba(255,255,255,.5);transition:all .3s var(--ease)}
.mode-tab:hover{border-color:rgba(29,122,29,.4);color:var(--g3);transform:translateY(-1px)}
.mode-tab.active{background:linear-gradient(135deg,var(--g),var(--g2));border-color:var(--g);color:#fff;box-shadow:0 6px 20px rgba(29,122,29,.4)}
.mode-tab.quick.active{background:linear-gradient(135deg,#8b6914,var(--y));border-color:var(--y);box-shadow:0 6px 20px rgba(201,162,39,.35)}
.art-body-block{animation:artFade .6s var(--ease) both}
@keyframes artFade{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.content video{width:100%;max-width:720px;border-radius:8px;margin:1.25rem 0;background:#000}
.content{font-size:1.03rem;color:rgba(255,255,255,.88);line-height:1.88;max-width:72ch}
.content p{margin:0 0 1.4rem;text-align:justify;hyphens:auto}
.content p:first-of-type{font-size:1.1rem;color:rgba(255,255,255,.93)}
.content strong{color:#fff}
.content h3.art-subhead{font-family:var(--ff-serif);font-size:1.22rem;line-height:1.35;margin:2rem 0 1rem;color:var(--y);border-left:3px solid var(--accent);padding-left:14px}
.content ul{margin:12px 0 18px 20px;list-style:disc}
.content li{margin-bottom:10px;line-height:1.65}
.content .art-sources{margin-top:2.5rem;padding:1.25rem 1.4rem;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:8px}
.content .art-sources-title{font-family:var(--ff-display);letter-spacing:1.5px;font-size:.9rem;color:var(--y);margin:0 0 12px}
.content .art-src{color:var(--dim);font-size:.88rem}
.content .art-meta-note{margin-top:2rem;padding-top:1.25rem;border-top:1px solid rgba(255,255,255,.08);font-size:.88rem;color:var(--dim)}
.content .art-source-link{display:inline-flex;align-items:center;gap:8px;color:var(--g3);font-weight:600;margin-top:8px}
.content .article-gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin:1.5rem 0}
.content .article-gallery figure{margin:0;border-radius:6px;overflow:hidden;border:1px solid rgba(255,255,255,.08)}
.content .article-gallery img{width:100%;aspect-ratio:16/10;object-fit:cover}
.quick-box{background:linear-gradient(135deg,rgba(201,162,39,.1),rgba(29,122,29,.08));border:1px solid rgba(201,162,39,.28);border-radius:12px;padding:26px 28px;margin-bottom:28px;position:relative;overflow:hidden}
.quick-box::before{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.04),transparent);animation:shimmer 4s ease infinite}
@keyframes shimmer{0%{left:-100%}50%,100%{left:150%}}
.quick-box .qlabel{font-size:.62rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--y);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.quick-box .qtext{font-size:1.06rem;line-height:1.78;color:rgba(255,255,255,.92)}
.quick-box .qctx{font-size:.82rem;color:var(--dim);margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,.06)}
.share{margin-top:48px;padding:24px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:12px}
.share h4{font-family:var(--ff-display);letter-spacing:2px;color:var(--y);margin-bottom:16px;font-size:.95rem}
.share-btns{display:flex;gap:12px;flex-wrap:wrap}
.share-btns a{display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:24px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);font-size:.75rem;font-weight:600;color:rgba(255,255,255,.6);transition:all .25s var(--ease)}
.share-btns a:hover{transform:translateY(-2px);color:#fff}
.share-btns a.wa:hover{background:#128c7e;border-color:#128c7e}
.share-btns a.fb:hover{background:#1877f2;border-color:#1877f2}
.share-btns a.cp:hover{background:var(--g);border-color:var(--g)}
.related{margin-top:60px}
.related h3{font-family:var(--ff-display);font-size:1.4rem;letter-spacing:2px;margin-bottom:20px;color:var(--y)}
.rel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
.rel-card{background:var(--k3);border:1px solid rgba(255,255,255,.06);border-radius:8px;overflow:hidden;transition:border-color .3s,transform .35s var(--ease),box-shadow .3s}
.rel-card:hover{border-color:rgba(29,122,29,.45);transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.4)}
.rel-card img{width:100%;height:140px;object-fit:cover;transition:transform .5s var(--ease)}
.rel-card:hover img{transform:scale(1.05)}
.rel-card .body{padding:14px}
.rel-card h4{font-size:.82rem;font-weight:600;line-height:1.4}
.rel-card .rel-cat{font-size:.6rem;color:var(--g3);letter-spacing:1px;text-transform:uppercase;margin-top:4px}
.article-layout{display:grid;grid-template-columns:1fr 300px;gap:32px;align-items:start}
.article-main{min-width:0}
.article-aside{position:sticky;top:72px;display:flex;flex-direction:column;gap:20px}
.sponsored-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:.58rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;background:rgba(201,162,39,.14);color:var(--y);margin-bottom:12px;animation:pulseBadge 2.5s ease infinite}
@keyframes pulseBadge{0%,100%{box-shadow:0 0 0 0 rgba(201,162,39,.2)}50%{box-shadow:0 0 0 6px rgba(201,162,39,0)}}
.not-found{text-align:center;padding:120px 28px}
.not-found h1{font-family:var(--ff-display);font-size:2rem;margin-bottom:12px}
.not-found a{color:var(--g3);margin-top:20px;display:inline-block}
footer{text-align:center;padding:28px clamp(12px,3vw,28px);font-size:.72rem;color:#444;border-top:1px solid rgba(255,255,255,.04)}
.pa-scroll-nav{position:fixed;right:calc(12px + env(safe-area-inset-right));top:50%;transform:translateY(-50%);z-index:7500;display:flex;flex-direction:column;align-items:center;gap:4px;padding:4px 3px;background:linear-gradient(180deg,#1e1e1e,#0a0a0a);border:1px solid rgba(255,255,255,.12);border-radius:6px;box-shadow:0 4px 24px rgba(0,0,0,.65);opacity:0;pointer-events:none;transition:opacity .4s}
.pa-scroll-nav.visible{opacity:1;pointer-events:all}
.pa-scroll-btn{width:26px;height:22px;border:none;cursor:pointer;background:linear-gradient(180deg,#333,#1a1a1a);color:rgba(255,255,255,.75);font-size:.5rem;border-radius:3px;display:flex;align-items:center;justify-content:center}
.pa-scroll-track{width:8px;height:clamp(100px,24vh,180px);background:#111;border-radius:4px;position:relative;border:1px solid rgba(255,255,255,.08);overflow:hidden}
.pa-scroll-thumb{position:absolute;left:0;right:0;top:0;min-height:32px;border-radius:3px;background:linear-gradient(90deg,#8a8a8a,#d4d4d4 45%,#a0a0a0);box-shadow:inset 0 1px 0 rgba(255,255,255,.85),0 1px 4px rgba(0,0,0,.5);transition:transform .12s}
body.cat-policia{--accent:#c0392b;--accent-glow:rgba(192,57,43,.35)}
body.cat-politica{--accent:#2980b9;--accent-glow:rgba(41,128,185,.35)}
body.cat-saude{--accent:#16a085;--accent-glow:rgba(22,160,133,.35)}
body.cat-pains{--accent:#1d7a1d;--accent-glow:rgba(29,122,29,.35)}
@media(max-width:768px){.pa-scroll-nav{display:none}.art-hero-wrap{border-radius:0}}
@media(max-width:900px){.article-layout{grid-template-columns:1fr}.article-aside{position:static}}
@media(max-width:600px){.meta-chips{gap:6px}.rel-grid{grid-template-columns:1fr}.share-btns a span{display:none}}
</style>
</head>
<body>
<div id="readProgress" aria-hidden="true"></div>
<div class="top-bar">
  <div class="top-inner">
    <a href="../index.html"><img src="../assets/images/pains-acontece-logo.png" alt="Pains Acontece"/></a>
    <div style="margin-left:auto;display:flex;align-items:center;gap:12px">
      <div id="paUserNav" class="pa-user-nav"></div>
      <a href="../index.html" class="back" style="margin-left:0"><i class="fas fa-arrow-left"></i> Voltar</a>
    </div>
  </div>
</div>
<main id="main"></main>
<footer>© 2026 Pains Acontece — Todos os direitos reservados.</footer>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/core/config.js"></script>
<script src="../js/core/supabase-client.js"></script>
<script src="../js/ui/article-format.js"></script>
<script src="../js/ai/scanner.js"></script>
<script src="../js/core/purge.js?v=20260705v21"></script>
<script src="../js/core/api.js?v=20260705v22"></script>
<script src="../js/ui/ads.js?v=20260705v21"></script>
<script src="../js/core/store.js"></script>
<script src="../js/ui/scroll-nav.js"></script>
<script src="../js/ai/agents/sofia.js"></script>
<script src="../js/ai/agents/lucas.js"></script>
<script src="../js/ai/agents/camila.js"></script>
<script src="../js/ai/orchestrator.js"></script>
<script src="../js/ai/public-assistant.js"></script>
<script src="../js/ui/dialog.js?v=20260705v25"></script>
<script src="../js/core/social.js?v=20260705v25"></script>
<script src="../js/ui/social-widget.js?v=20260705v25"></script>
<script src="../js/ui/user-nav.js?v=20260705v25"></script>
<script>
(async function(){
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  const mode = params.get('mode') === 'quick' ? 'quick' : 'full';
  const main = document.getElementById('main');

  function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}

  if(!id){
    main.innerHTML='<div class="not-found"><h1>Notícia não encontrada</h1><p>Selecione uma matéria no portal.</p><a href="../index.html">Ir para a home</a></div>';
    return;
  }

  await PAStore.init();
  const art = PAStore.getArticle(id);
  if(!art || art.status !== 'pub'){
    main.innerHTML='<div class="not-found"><h1>Notícia não encontrada</h1><p>Esta matéria não está disponível ou foi removida.</p><a href="../index.html">Ir para a home</a></div>';
    return;
  }

  await PAStore.incrementViews(id);
  document.title = art.title + ' – Pains Acontece';
  window.PACurrentArticle = art;
  if (typeof PAPublicIA !== 'undefined') PAPublicIA.init();

  const related = PAStore.getArticles('pub').filter(a => a.id !== art.id && a.cat === art.cat).slice(0,3);
  let quickText = art.quickLead || art.lead || art.title;
  if (quickText.length > 400 && typeof PAArticleFormat !== 'undefined') {
    quickText = PAArticleFormat.firstParagraph(quickText, 380) || quickText.slice(0, 377) + '…';
  }
  let currentMode = mode;
  let firstRender = true;

  function formatBody(html) {
    if (!html) return '<p>Conteúdo em breve.</p>';
    if (typeof PAArticleFormat !== 'undefined') {
      return PAArticleFormat.reorganizeContent(html);
    }
    return html;
  }

  function pubLabel(a) {
    if (typeof PAScanner !== 'undefined' && PAScanner.formatPubLabel) {
      let pd = a.pubISO ? new Date(a.pubISO) : null;
      if (!pd || isNaN(pd.getTime())) {
        const p = (a.date || '').split('/');
        if (p.length === 3) pd = new Date(+p[2], +p[1] - 1, +p[0]);
      }
      if (pd && !isNaN(pd.getTime())) return PAScanner.formatPubLabel(pd, a.pubISO);
    }
    return [a.date, a.timeAgo].filter(Boolean).join(' · ');
  }

  function readingTime(html) {
    const plain = (html || '').replace(/<[^>]+>/g, ' ');
    const words = plain.trim().split(/\s+/).filter(Boolean).length;
    const mins = Math.max(1, Math.ceil(words / 200));
    return mins + ' min de leitura';
  }

  function catClass(cat) {
    const c = (cat || '').toLowerCase();
    if (c.includes('políc') || c.includes('polic')) return 'cat-policia';
    if (c.includes('polít') || c.includes('polit')) return 'cat-politica';
    if (c.includes('saúd') || c.includes('saud')) return 'cat-saude';
    if (c.includes('pains')) return 'cat-pains';
    return '';
  }

  function authorInitial(name) {
    return esc((name || 'R')[0].toUpperCase());
  }

  document.body.classList.add(catClass(art.cat));

  function bindProgress() {
    const bar = document.getElementById('readProgress');
    if (!bar) return;
    const onScroll = () => {
      const h = document.documentElement.scrollHeight - window.innerHeight;
      bar.style.width = h > 0 ? (window.scrollY / h * 100) + '%' : '0%';
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
  }

  function render(){
    const isQuick = currentMode === 'quick';
    const bodyHtml = formatBody(art.content);
    const author = art.author || 'Redação Pains Acontece';
    const sponsored = art.sponsored ? '<span class="sponsored-badge"><i class="fas fa-star"></i> Conteúdo Patrocinado</span>' : '';
    const heroBlock = art.video
      ? `<div class="art-hero-wrap"><div class="hero-video"><video src="${esc(art.video)}" controls playsinline poster="${esc(art.img)}"></video></div><div class="hero-accent"></div></div>`
      : `<div class="art-hero-wrap"><div class="hero-img"><img src="${esc(art.img)}" alt="${esc(art.title)}"/></div><div class="hero-accent"></div></div>`;

    main.innerHTML = `
    <div class="article">
    ${heroBlock}
    <div class="wrap">
    <div class="article-layout">
    <article class="article-main">
      <header class="art-header">
        ${sponsored}
        <nav class="art-breadcrumb"><a href="../index.html">Home</a><i class="fas fa-chevron-right" style="font-size:.5rem"></i><span>${esc(art.cat)}</span></nav>
        <span class="cat">${esc(art.cat)}</span>
        <h1 class="title">${esc(art.title)}</h1>
        ${art.lead && !isQuick ? `<p class="lead">${esc(art.lead)}</p>` : ''}
        <div class="author-card">
          <div class="author-av">${authorInitial(author)}</div>
          <div class="author-info">
            <strong>${esc(author)}</strong>
            <span>${esc(pubLabel(art))}</span>
          </div>
        </div>
        <div class="meta-chips">
          <span class="meta-chip"><i class="fas fa-clock"></i> ${readingTime(art.content)}</span>
          <span class="meta-chip"><i class="fas fa-eye"></i> ${Number(art.views||0).toLocaleString('pt-BR')} leituras</span>
          ${art.verified ? '<span class="meta-chip verified"><i class="fas fa-check-circle"></i> Verificada pela IA</span>' : ''}
        </div>
      </header>
      <div class="mode-tabs">
        <button class="mode-tab quick ${isQuick?'active':''}" data-mode="quick"><i class="fas fa-bolt"></i> Notícia Rápida</button>
        <button class="mode-tab ${!isQuick?'active':''}" data-mode="full"><i class="fas fa-file-alt"></i> Matéria Completa</button>
      </div>
      <div class="art-body-block">
      ${isQuick ? `
        <div class="quick-box">
          <div class="qlabel"><i class="fas fa-bolt"></i> Resumo explicativo</div>
          <p class="qtext">${esc(quickText)}</p>
          <p class="qctx">Versão resumida e explicativa. A matéria completa traz detalhes, fontes e verificação da IA.</p>
        </div>` : `<div class="content">${bodyHtml}</div>`}
      </div>
      <div class="share">
        <h4><i class="fas fa-share-alt"></i> Compartilhar matéria</h4>
        <div class="share-btns">
          <a class="wa" href="https://wa.me/?text=${encodeURIComponent(art.title + ' - Pains Acontece ' + location.href)}" target="_blank" rel="noopener"><i class="fab fa-whatsapp"></i><span>WhatsApp</span></a>
          <a class="fb" href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(location.href)}" target="_blank" rel="noopener"><i class="fab fa-facebook-f"></i><span>Facebook</span></a>
          <a class="cp" href="#" id="btnCopyLink"><i class="fas fa-link"></i><span>Copiar link</span></a>
        </div>
      </div>
      <div id="paSocialMount"></div>
      ${related.length ? `<div class="related"><h3>Notícias Relacionadas</h3><div class="rel-grid">${related.map(r=>`
        <a href="noticia.html?id=${r.id}" class="rel-card"><img src="${esc(r.img)}" alt=""/><div class="body"><h4>${esc(r.title)}</h4><div class="rel-cat">${esc(r.cat)}</div></div></a>`).join('')}</div></div>` : ''}
    </article>
    <aside class="article-aside" id="adArticleSidebar"></aside>
    </div></div></div>`;

    if (typeof PAAds !== 'undefined') PAAds.renderSidebar('adArticleSidebar');
    main.querySelectorAll('.mode-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        currentMode = btn.dataset.mode;
        history.replaceState(null, '', `noticia.html?id=${id}&mode=${currentMode}`);
        render();
      });
    });
    document.getElementById('btnCopyLink')?.addEventListener('click', e => {
      e.preventDefault();
      navigator.clipboard.writeText(location.href).then(() => {
        if (typeof PADialog !== 'undefined') PADialog.toast('Link copiado!', 'success');
      }).catch(() => PADialog?.alert?.({ message: 'Não foi possível copiar o link.', variant: 'warning' }));
    });
    const socialMount = document.getElementById('paSocialMount');
    if (socialMount && typeof PASocialWidget !== 'undefined') {
      PASocialWidget.mount(socialMount, id);
    }
    if (firstRender) { bindProgress(); firstRender = false; }
  }
  PAUserNav.init('#paUserNav');
  render();
})();
</script>
</body>
</html>
