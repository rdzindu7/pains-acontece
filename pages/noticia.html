<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<link rel="icon" type="image/jpeg" href="../assets/images/favicon.jpg"/>
<link rel="apple-touch-icon" href="../assets/images/favicon.jpg"/>
<title>Notícia – Pains Acontece</title>
<meta name="pa-build" content="2026.07.05-v20"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#1d7a1d;--g2:#0d4d0d;--g3:#2ecc2e;
  --y:#c9a227;--y2:#f0d060;
  --k:#080808;--k2:#111;--k3:#1a1a1a;--k4:#242424;
  --w:#f2f2f2;--dim:#555;--muted:rgba(255,255,255,.45);
  --accent:var(--g);--accent-glow:rgba(29,122,29,.35);
  --ff-display:'Bebas Neue',sans-serif;
  --ff-serif:'Playfair Display',serif;
  --ff-body:'Inter',sans-serif;
  --ease:cubic-bezier(.16,1,.3,1);
  --pad-x:clamp(12px,3vw,28px);
}
html{overflow-x:hidden;-webkit-text-size-adjust:100%;text-size-adjust:100%;scroll-behavior:smooth}
body{background:var(--k);color:var(--w);font-family:var(--ff-body);line-height:1.7;overflow-x:hidden;min-height:100dvh;padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right)}
a{text-decoration:none;color:inherit}
img{display:block;max-width:100%}

/* Ambiente */
.page-ambient{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 70% 50% at 15% 20%,rgba(13,77,13,.18) 0%,transparent 55%),
             radial-gradient(ellipse 50% 40% at 85% 80%,rgba(201,162,39,.08) 0%,transparent 50%)}
body::before{content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity:.028;pointer-events:none;z-index:9998}
.cursor-glow{width:320px;height:320px;background:radial-gradient(circle,rgba(29,122,29,.14) 0%,transparent 70%);
  position:fixed;top:-160px;left:-160px;pointer-events:none;z-index:9999;transition:transform .06s linear;border-radius:50%}
.art-particles{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden}
.art-particle{position:absolute;border-radius:50%;background:var(--g3);opacity:0;animation:particleFloat linear infinite}
@keyframes particleFloat{
  0%{transform:translateY(100vh) scale(0);opacity:0}
  8%{opacity:.25}
  92%{opacity:.04}
  100%{transform:translateY(-8vh) scale(1);opacity:0}
}

/* Progresso */
#readProgress{position:fixed;top:0;left:0;height:4px;width:0;
  background:linear-gradient(90deg,var(--accent),var(--y),var(--accent));
  background-size:200% 100%;animation:progressShine 3s linear infinite;
  z-index:200;box-shadow:0 0 16px var(--accent-glow),0 2px 8px rgba(0,0,0,.4);transition:width .1s}
@keyframes progressShine{0%{background-position:0% 50%}100%{background-position:200% 50%}}

#main{position:relative;z-index:2;min-height:50vh}
.wrap{max-width:min(900px,100%);margin:0 auto;padding:0 var(--pad-x);width:100%;position:relative;z-index:2}
.top-bar{background:rgba(8,8,8,.82);border-bottom:1px solid rgba(29,122,29,.22);
  padding:12px 0;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px) saturate(160%);
  padding-top:calc(12px + env(safe-area-inset-top));transition:box-shadow .3s,background .3s}
.top-bar.scrolled{background:rgba(8,8,8,.95);box-shadow:0 4px 32px rgba(0,0,0,.6)}
.top-inner{max-width:min(900px,100%);margin:0 auto;padding:0 var(--pad-x);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.top-inner img{height:38px;transition:transform .3s var(--ease),filter .3s;filter:drop-shadow(0 0 8px rgba(29,122,29,.4))}
.top-inner a:first-child:hover img{transform:scale(1.05);filter:drop-shadow(0 0 14px rgba(29,122,29,.7))}
.back{font-size:.76rem;color:var(--g3);display:flex;align-items:center;gap:8px;transition:color .2s,gap .2s,transform .2s}
.back:hover{color:var(--y);gap:10px;transform:translateX(-2px)}
.top-ia-btn{font-size:.72rem;font-weight:600;color:#fff;display:inline-flex;align-items:center;gap:7px;
  padding:8px 14px;border-radius:20px;border:1px solid rgba(29,122,29,.45);
  background:linear-gradient(135deg,rgba(29,122,29,.35),rgba(13,77,13,.2));cursor:pointer;font-family:inherit;
  transition:all .25s var(--ease);white-space:nowrap}
.top-ia-btn i{color:var(--g3);font-size:.78rem}
.top-ia-btn:hover{border-color:var(--g3);transform:translateY(-1px);box-shadow:0 6px 20px rgba(29,122,29,.35)}

/* Skeleton */
.art-skeleton{padding:0 0 80px;animation:skFadeIn .4s var(--ease)}
@keyframes skFadeIn{from{opacity:0}to{opacity:1}}
.sk-hero{height:min(58vh,420px);background:linear-gradient(110deg,var(--k3) 25%,var(--k4) 50%,var(--k3) 75%);
  background-size:200% 100%;animation:skShimmer 1.4s ease infinite;margin-bottom:32px;border-radius:0 0 16px 16px;position:relative}
.sk-hero::after{content:'Carregando matéria…';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:.82rem;color:rgba(255,255,255,.35);letter-spacing:1px}
.art-load-err{text-align:center;padding:100px var(--pad-x);position:relative;z-index:2}
.art-load-err h2{font-family:var(--ff-display);font-size:1.6rem;margin-bottom:10px;color:var(--y)}
.art-load-err p{color:var(--dim);margin-bottom:20px;font-size:.9rem}
.art-load-err a{color:var(--g3);display:inline-flex;align-items:center;gap:8px}
.sk-line{height:14px;border-radius:6px;background:linear-gradient(110deg,var(--k3) 25%,var(--k4) 50%,var(--k3) 75%);
  background-size:200% 100%;animation:skShimmer 1.4s ease infinite;margin-bottom:12px}
.sk-line.w80{width:80%}.sk-line.w60{width:60%}.sk-line.w40{width:40%}
.sk-line.title{height:36px;margin-bottom:16px}
@keyframes skShimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.art-loaded{animation:pageIn .8s var(--ease) both}
@keyframes pageIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* Hero — só imagem, texto abaixo */
.article{padding:0 0 100px}
.art-hero-img{margin:0 calc(-1 * var(--pad-x)) 0;position:relative}
.hero-frame{position:relative;height:clamp(200px,38vw,400px);overflow:hidden;background:var(--k3)}
.hero-frame img,.hero-frame video{width:100%;height:100%;object-fit:cover;display:block;transition:transform 8s var(--ease)}
.art-loaded .hero-frame:hover img,.art-loaded .hero-frame:hover video{transform:scale(1.04)}
.hero-frame .hero-no-img{width:100%;height:100%;background:linear-gradient(135deg,var(--k3),var(--k2))}
.hero-accent{height:3px;background:linear-gradient(90deg,transparent,var(--accent),var(--y),var(--accent),transparent)}
.art-top{padding:24px 0 8px;animation:artTopIn .6s var(--ease) both}
@keyframes artTopIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.art-breadcrumb{font-size:.68rem;color:rgba(255,255,255,.4);margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.art-breadcrumb a{color:var(--g3);transition:color .2s}.art-breadcrumb a:hover{color:var(--y)}
.art-top-row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.cat{display:inline-block;background:rgba(29,122,29,.15);color:var(--g3);font-size:.62rem;font-weight:800;letter-spacing:2px;
  text-transform:uppercase;padding:6px 14px;border-radius:20px;border:1px solid rgba(46,204,46,.3);flex-shrink:0}
.art-date{font-size:.72rem;color:rgba(255,255,255,.45);display:flex;align-items:center;gap:6px;white-space:nowrap}
.art-date i{color:var(--g3);font-size:.65rem}
.art-title{font-family:var(--ff-serif);font-size:clamp(1.65rem,4vw,2.6rem);line-height:1.22;color:#fff;
  margin:0 0 18px;word-break:normal;overflow-wrap:break-word;hyphens:none;max-width:100%}
.art-header{padding-top:4px}
.lead{font-size:1.14rem;color:rgba(255,255,255,.7);margin-bottom:28px;line-height:1.7;
  border-left:3px solid var(--accent);padding-left:18px;position:relative}
.lead::before{content:'"';position:absolute;left:-2px;top:-8px;font-family:var(--ff-serif);font-size:2.4rem;
  color:var(--accent);opacity:.5;line-height:1}
.author-card{display:flex;align-items:center;gap:14px;padding:16px 18px;
  background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.08);border-radius:12px;margin-bottom:22px;
  transition:border-color .3s,transform .3s var(--ease),box-shadow .3s}
.author-card:hover{border-color:rgba(29,122,29,.35);transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.35)}
.author-av{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--g2));
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.05rem;color:#fff;flex-shrink:0;
  box-shadow:0 4px 20px var(--accent-glow);position:relative}
.author-av::after{content:'';position:absolute;inset:-3px;border-radius:50%;border:2px solid rgba(46,204,46,.25);animation:avRing 3s ease infinite}
@keyframes avRing{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:.8;transform:scale(1.06)}}
.author-info strong{display:block;font-size:.9rem;color:#fff}
.author-info span{font-size:.72rem;color:var(--dim)}
.meta-chips{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:28px}
.meta-chip{display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border-radius:24px;font-size:.72rem;
  color:rgba(255,255,255,.6);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  transition:all .3s var(--ease);cursor:default}
.meta-chip:hover{border-color:rgba(29,122,29,.4);background:rgba(29,122,29,.1);color:rgba(255,255,255,.85);transform:translateY(-2px)}
.meta-chip i{color:var(--g3);font-size:.7rem;transition:transform .3s}
.meta-chip:hover i{transform:scale(1.15)}
.meta-chip.verified{border-color:rgba(46,204,46,.35);color:var(--g3);background:rgba(46,204,46,.08)}

/* Abas de modo */
.mode-tabs{display:flex;gap:10px;margin-bottom:32px;padding:5px;background:rgba(255,255,255,.03);
  border-radius:28px;border:1px solid rgba(255,255,255,.06);width:fit-content}
.mode-tab{padding:12px 22px;border-radius:24px;font-size:.7rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  cursor:pointer;border:1px solid transparent;background:transparent;color:rgba(255,255,255,.45);
  transition:all .35s var(--ease);display:flex;align-items:center;gap:8px}
.mode-tab i{font-size:.75rem;transition:transform .3s}
.mode-tab:hover{color:var(--g3);background:rgba(255,255,255,.04)}
.mode-tab:hover i{transform:scale(1.1)}
.mode-tab.active{background:linear-gradient(135deg,var(--g),var(--g2));border-color:var(--g);color:#fff;
  box-shadow:0 8px 28px rgba(29,122,29,.45)}
.mode-tab.quick.active{background:linear-gradient(135deg,#8b6914,var(--y));border-color:var(--y);box-shadow:0 8px 28px rgba(201,162,39,.4)}
.mode-panels{position:relative;min-height:120px}
.mode-panel{display:none;animation:none}
.mode-panel.active{display:block;animation:panelIn .55s var(--ease) both}
@keyframes panelIn{from{opacity:0;transform:translateY(16px) scale(.99)}to{opacity:1;transform:none}}

.content video{width:100%;max-width:720px;border-radius:10px;margin:1.25rem 0;background:#000;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.content{font-size:1.05rem;color:rgba(255,255,255,.88);line-height:1.92;max-width:72ch}
.content p{margin:0 0 1.5rem;text-align:justify;hyphens:auto}
.content p:first-of-type{font-size:1.12rem;color:rgba(255,255,255,.94)}
.content p:first-of-type::first-letter{
  float:left;font-family:var(--ff-serif);font-size:3.6rem;line-height:.85;padding:4px 12px 0 0;
  color:var(--accent);font-weight:900;text-shadow:0 2px 12px var(--accent-glow)}
.content strong{color:#fff}
.content blockquote,.content .art-pullquote{
  margin:2rem 0;padding:1.4rem 1.6rem;font-family:var(--ff-serif);font-size:1.2rem;font-style:italic;line-height:1.55;
  color:rgba(255,255,255,.85);border-left:4px solid var(--y);
  background:linear-gradient(135deg,rgba(201,162,39,.08),rgba(29,122,29,.05));border-radius:0 10px 10px 0}
.content h3.art-subhead{font-family:var(--ff-serif);font-size:1.28rem;line-height:1.35;margin:2.2rem 0 1rem;color:var(--y);
  border-left:3px solid var(--accent);padding-left:16px;scroll-margin-top:88px}
.content ul{margin:12px 0 18px 20px;list-style:disc}
.content li{margin-bottom:10px;line-height:1.65}
.content .art-sources{margin-top:2.5rem;padding:1.4rem 1.5rem;background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.08);border-radius:10px}
.content .art-sources-title{font-family:var(--ff-display);letter-spacing:1.5px;font-size:.9rem;color:var(--y);margin:0 0 12px}
.content .art-src{color:var(--dim);font-size:.88rem}
.content .art-meta-note{margin-top:2rem;padding-top:1.25rem;border-top:1px solid rgba(255,255,255,.08);font-size:.88rem;color:var(--dim)}
.content .art-source-link{display:inline-flex;align-items:center;gap:8px;color:var(--g3);font-weight:600;margin-top:8px;transition:color .2s,gap .2s}
.content .art-source-link:hover{color:var(--y);gap:10px}
.content .article-gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin:1.5rem 0}
.content .article-gallery figure{margin:0;border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,.08);transition:transform .4s var(--ease)}
.content .article-gallery figure:hover{transform:scale(1.02)}
.content .article-gallery img{width:100%;aspect-ratio:16/10;object-fit:cover}

.quick-box{background:linear-gradient(135deg,rgba(201,162,39,.12),rgba(29,122,29,.1));
  border:1px solid rgba(201,162,39,.32);border-radius:14px;padding:28px 30px;margin-bottom:28px;position:relative;overflow:hidden}
.quick-box::before{content:'';position:absolute;top:0;left:-100%;width:50%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);animation:shimmer 5s ease infinite}
.quick-box::after{content:'';position:absolute;top:-40px;right:-40px;width:120px;height:120px;
  background:radial-gradient(circle,rgba(201,162,39,.15),transparent 70%);pointer-events:none}
@keyframes shimmer{0%{left:-100%}45%,100%{left:150%}}
.quick-box .qlabel{font-size:.62rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--y);
  margin-bottom:14px;display:flex;align-items:center;gap:8px}
.quick-box .qlabel i{animation:boltPulse 2s ease infinite}
@keyframes boltPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.15)}}
.quick-box .qtext{font-size:1.08rem;line-height:1.82;color:rgba(255,255,255,.93)}
.quick-box .qctx{font-size:.82rem;color:var(--dim);margin-top:18px;padding-top:18px;border-top:1px solid rgba(255,255,255,.07)}

/* Compartilhar */
.share{margin-top:52px;padding:28px;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.07);
  border-radius:14px;position:relative;overflow:hidden}
.share::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--accent),var(--y),transparent)}
.share h4{font-family:var(--ff-display);letter-spacing:2px;color:var(--y);margin-bottom:18px;font-size:.95rem;display:flex;align-items:center;gap:10px}
.share-btns{display:flex;gap:12px;flex-wrap:wrap}
.share-btns a{display:flex;align-items:center;gap:8px;padding:11px 18px;border-radius:28px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);font-size:.75rem;font-weight:600;
  color:rgba(255,255,255,.65);transition:all .3s var(--ease)}
.share-btns a:hover{transform:translateY(-3px);color:#fff;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.share-btns a.wa:hover{background:#128c7e;border-color:#128c7e}
.share-btns a.fb:hover{background:#1877f2;border-color:#1877f2}
.share-btns a.cp:hover{background:var(--g);border-color:var(--g)}
.share-btns a.x:hover{background:#111;border-color:#333}

/* Relacionadas */
.related{margin-top:64px}
.related h3{font-family:var(--ff-display);font-size:1.5rem;letter-spacing:2px;margin-bottom:24px;color:var(--y);
  display:flex;align-items:center;gap:12px}
.related h3::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(201,162,39,.4),transparent)}
.rel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px}
.rel-card{background:var(--k3);border:1px solid rgba(255,255,255,.07);border-radius:10px;overflow:hidden;
  transition:border-color .35s,transform .4s var(--ease),box-shadow .35s;position:relative}
.rel-card::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 50%,rgba(29,122,29,.12));
  opacity:0;transition:opacity .35s;z-index:1;pointer-events:none}
.rel-card:hover::before{opacity:1}
.rel-card:hover{border-color:rgba(29,122,29,.5);transform:translateY(-6px);box-shadow:0 16px 40px rgba(0,0,0,.45)}
.rel-card img{width:100%;height:148px;object-fit:cover;transition:transform .6s var(--ease)}
.rel-card:hover img{transform:scale(1.08)}
.rel-card .body{padding:16px;position:relative;z-index:2}
.rel-card h4{font-size:.84rem;font-weight:600;line-height:1.45;transition:color .2s}
.rel-card:hover h4{color:var(--g3)}
.rel-card .rel-cat{font-size:.6rem;color:var(--g3);letter-spacing:1px;text-transform:uppercase;margin-top:6px}

/* Layout + sidebar */
.article-layout{display:grid;grid-template-columns:1fr 280px;gap:36px;align-items:start}
.article-main{min-width:0}
.article-aside{position:sticky;top:80px;display:flex;flex-direction:column;gap:18px}
.aside-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:18px;
  transition:border-color .3s,box-shadow .3s}
.aside-card:hover{border-color:rgba(29,122,29,.3);box-shadow:0 8px 28px rgba(0,0,0,.3)}
.aside-card h5{font-family:var(--ff-display);letter-spacing:1.5px;font-size:.88rem;color:var(--y);margin-bottom:14px;
  display:flex;align-items:center;gap:8px}
.aside-toc{list-style:none;margin:0;padding:0}
.aside-toc li{margin-bottom:8px}
.aside-toc a{font-size:.74rem;color:rgba(255,255,255,.5);display:flex;align-items:flex-start;gap:8px;
  padding:6px 8px;border-radius:6px;transition:all .25s var(--ease);line-height:1.4}
.aside-toc a::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--g3);margin-top:7px;flex-shrink:0;opacity:.5;transition:opacity .2s}
.aside-toc a:hover,.aside-toc a.active{color:var(--g3);background:rgba(29,122,29,.1);padding-left:12px}
.aside-toc a:hover::before,.aside-toc a.active::before{opacity:1}
.aside-mini-rel{display:flex;flex-direction:column;gap:10px}
.aside-mini-rel a{display:flex;gap:10px;align-items:center;padding:8px;border-radius:8px;
  transition:background .25s,transform .25s}
.aside-mini-rel a:hover{background:rgba(255,255,255,.04);transform:translateX(4px)}
.aside-mini-rel img{width:52px;height:40px;object-fit:cover;border-radius:6px;flex-shrink:0}
.aside-mini-rel span{font-size:.7rem;line-height:1.35;color:rgba(255,255,255,.65)}

.sponsored-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:.58rem;
  font-weight:800;letter-spacing:1px;text-transform:uppercase;background:rgba(201,162,39,.16);color:var(--y);
  margin-bottom:14px;animation:pulseBadge 2.5s ease infinite}
@keyframes pulseBadge{0%,100%{box-shadow:0 0 0 0 rgba(201,162,39,.25)}50%{box-shadow:0 0 0 8px rgba(201,162,39,0)}}

/* FAB flutuante */
.art-fab{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(80px);
  z-index:90;display:flex;align-items:center;gap:6px;padding:6px 8px;
  background:rgba(18,18,18,.92);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.1);
  border-radius:32px;box-shadow:0 8px 40px rgba(0,0,0,.6);opacity:0;pointer-events:none;transition:all .45s var(--ease)}
.art-fab.visible{opacity:1;pointer-events:all;transform:translateX(-50%) translateY(0)}
.art-fab button{width:42px;height:42px;border-radius:50%;border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.06);color:rgba(255,255,255,.7);cursor:pointer;font-size:.9rem;
  display:flex;align-items:center;justify-content:center;transition:all .25s var(--ease)}
.art-fab button:hover{background:var(--g);border-color:var(--g);color:#fff;transform:scale(1.08)}
.art-fab .fab-divider{width:1px;height:24px;background:rgba(255,255,255,.1)}

/* Reveal */
.reveal{opacity:0;transform:translateY(22px);transition:opacity .7s var(--ease),transform .7s var(--ease)}
.reveal.visible,.reveal.no-animate{opacity:1;transform:translateY(0)}
.art-top,.art-top .meta-chips,.art-header .reveal,.mode-tabs,.mode-panels .quick-box,.share{opacity:1;transform:none}
.art-header .reveal{transition:opacity .5s var(--ease),transform .5s var(--ease)}
.reveal-delay-1{transition-delay:.08s}.reveal-delay-2{transition-delay:.16s}
.reveal-delay-3{transition-delay:.24s}.reveal-delay-4{transition-delay:.32s}

.not-found{text-align:center;padding:120px 28px;position:relative;z-index:2}
.not-found h1{font-family:var(--ff-display);font-size:2rem;margin-bottom:12px}
.not-found a{color:var(--g3);margin-top:20px;display:inline-block;transition:color .2s}
.not-found a:hover{color:var(--y)}
footer{text-align:center;padding:28px var(--pad-x);font-size:.72rem;color:#444;border-top:1px solid rgba(255,255,255,.04);position:relative;z-index:2}

body.page-noticia .pa-scroll-nav{display:none!important}
body.cat-policia{--accent:#c0392b;--accent-glow:rgba(192,57,43,.35)}
body.cat-politica{--accent:#2980b9;--accent-glow:rgba(41,128,185,.35)}
body.cat-saude{--accent:#16a085;--accent-glow:rgba(22,160,133,.35)}
body.cat-pains{--accent:#1d7a1d;--accent-glow:rgba(29,122,29,.35)}

@media(max-width:768px){
  .cursor-glow,.art-particles{display:none}
  .art-fab{bottom:calc(88px + env(safe-area-inset-bottom))}
  .hero-frame{height:clamp(180px,48vw,280px)}
  .art-title{font-size:clamp(1.45rem,5.5vw,2rem)}
  .content p:first-of-type::first-letter{font-size:2.8rem}
}
@media(max-width:900px){.article-layout{grid-template-columns:1fr}.article-aside{position:static;display:grid;grid-template-columns:1fr 1fr;gap:14px}}
@media(max-width:600px){
  .meta-chips{gap:6px}.rel-grid{grid-template-columns:1fr}
  .share-btns a span{display:none}
  .article-aside{grid-template-columns:1fr}
  .mode-tabs{width:100%;flex-wrap:wrap;justify-content:center}
}
@media(prefers-reduced-motion:reduce){
  .reveal,.art-loaded,.art-top,.mode-panel.active{animation:none;opacity:1;transform:none}
  .cursor-glow,.art-particles{animation:none}
}
</style>
</head>
<body class="page-noticia">
<div class="page-ambient" aria-hidden="true"></div>
<div class="art-particles" id="artParticles" aria-hidden="true"></div>
<div class="cursor-glow" id="cursorGlow" aria-hidden="true"></div>
<div id="readProgress" aria-hidden="true"></div>
<div class="top-bar" id="topBar">
  <div class="top-inner">
    <a href="../index.html"><img src="../assets/images/pains-acontece-logo.png" alt="Pains Acontece"/></a>
    <div style="margin-left:auto;display:flex;align-items:center;gap:12px">
      <button type="button" class="top-ia-btn" id="btnTopIA" title="Equipe IA — Sofia, Lucas, Camila e Tiago">
        <i class="fas fa-users"></i> Equipe IA
      </button>
      <div id="paUserNav" class="pa-user-nav"></div>
      <a href="../index.html" class="back"><i class="fas fa-arrow-left"></i> Voltar</a>
    </div>
  </div>
</div>
<main id="main"></main>
<div class="art-fab" id="artFab" aria-label="Ações rápidas">
  <button type="button" id="fabShare" title="Compartilhar"><i class="fas fa-share-alt"></i></button>
  <div class="fab-divider"></div>
  <button type="button" id="fabTop" title="Voltar ao topo"><i class="fas fa-arrow-up"></i></button>
</div>
<footer>© 2026 Pains Acontece — Todos os direitos reservados.</footer>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/core/config.js"></script>
<script src="../js/core/supabase-client.js"></script>
<script src="../js/ui/article-format.js"></script>
<script src="../js/ai/scanner.js"></script>
<script src="../js/core/purge.js?v=20260705v20"></script>
<script src="../js/core/auto-reload.js?v=20260705v20"></script>
<script src="../js/core/pains-media.js?v=20260705v40"></script>
<script src="../js/core/views-tracker.js?v=20260705v40"></script>
<script src="../js/core/api.js?v=20260705v40"></script>
<script src="../js/ui/ads.js?v=20260705v36"></script>
<script src="../js/core/store.js?v=20260705v40"></script>

<script src="../js/ai/agents/sofia.js"></script>
<script src="../js/ai/agents/lucas.js"></script>
<script src="../js/ai/agents/camila.js"></script>
<script src="../js/ai/agents/tiago.js?v=20260705v34"></script>
<script src="../js/ai/bus-assistant.js?v=20260705v34"></script>
<script src="../js/ai/news-search.js?v=20260705v34"></script>
<script src="../js/ai/orchestrator.js"></script>
<script src="../js/ai/public-assistant.js?v=20260705v34"></script>
<script src="../js/ui/dialog.js?v=20260705v34"></script>
<script src="../js/core/social.js?v=20260705v34"></script>
<script src="../js/ui/social-widget.js?v=20260705v34"></script>
<script src="../js/ui/user-nav.js?v=20260705v34"></script>
<script>
(async function(){
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  const mode = params.get('mode') === 'quick' ? 'quick' : 'full';
  const main = document.getElementById('main');
  let revealObserver = null;

  function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}

  function showSkeleton(){
    main.innerHTML=`<div class="art-skeleton wrap" style="padding-top:0">
      <div class="sk-hero"></div>
      <div class="sk-line title"></div>
      <div class="sk-line w80"></div>
      <div class="sk-line w60"></div>
      <div class="sk-line w40" style="margin-top:28px"></div>
      <div class="sk-line"></div><div class="sk-line"></div><div class="sk-line w80"></div>
    </div>`;
  }

  function initParticles(){
    const box=document.getElementById('artParticles');
    if(!box||window.matchMedia('(prefers-reduced-motion: reduce)').matches)return;
    for(let i=0;i<18;i++){
      const p=document.createElement('span');
      p.className='art-particle';
      const sz=Math.random()*3+1;
      p.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;animation-duration:${12+Math.random()*18}s;animation-delay:${Math.random()*8}s`;
      box.appendChild(p);
    }
  }

  function initCursorGlow(){
    const glow=document.getElementById('cursorGlow');
    if(!glow||window.matchMedia('(max-width:768px)').matches)return;
    document.addEventListener('mousemove',e=>{
      glow.style.transform=`translate(${e.clientX}px,${e.clientY}px)`;
    },{passive:true});
  }

  function initReveal(root){
    const scope=root||document;
    const els=scope.querySelectorAll('.reveal:not(.visible)');
    els.forEach(el=>{
      const r=el.getBoundingClientRect();
      if(r.top<window.innerHeight*.95)el.classList.add('visible');
    });
    if(!revealObserver){
      revealObserver=new IntersectionObserver(entries=>{
        entries.forEach(e=>{
          if(e.isIntersecting){e.target.classList.add('visible');revealObserver.unobserve(e.target)}
        });
      },{threshold:.05,rootMargin:'0px 0px -20px 0px'});
    }
    scope.querySelectorAll('.reveal:not(.visible)').forEach(el=>revealObserver.observe(el));
    requestAnimationFrame(()=>{
      scope.querySelectorAll('.reveal:not(.visible)').forEach(el=>el.classList.add('visible'));
    });
  }

  function showLoadError(msg){
    main.innerHTML=`<div class="art-load-err"><h2>Não foi possível abrir a matéria</h2><p>${esc(msg||'Erro ao carregar. Tente novamente.')}</p>
      <a href="../index.html"><i class="fas fa-arrow-left"></i> Voltar ao portal</a></div>`;
  }

  function enhanceBody(html){
    if(!html)return '<p class="reveal visible">Conteúdo em breve.</p>';
    const str=typeof html==='string'?html:String(html||'');
    let i=0;
    return str
      .replace(/<p>/g,'<p class="reveal">')
      .replace(/<h3 class="art-subhead"/g,()=>`<h3 id="sec-${i++}" class="art-subhead reveal"`)
      .replace(/<blockquote/g,'<blockquote class="art-pullquote reveal"');
  }

  function extractTOC(html){
    const d=document.createElement('div');
    d.innerHTML=html;
    return [...d.querySelectorAll('h3.art-subhead')].map((h,idx)=>({id:h.id||'sec-'+idx,text:h.textContent.trim()}));
  }

  if(!id){
    main.innerHTML='<div class="not-found"><h1>Notícia não encontrada</h1><p>Selecione uma matéria no portal.</p><a href="../index.html">Ir para a home</a></div>';
    initParticles();initCursorGlow();
    return;
  }

  document.getElementById('paScrollNav')?.remove();
  initParticles();
  initCursorGlow();

  function withTimeout(promise,ms){return Promise.race([promise,new Promise((_,r)=>setTimeout(()=>r(new Error('timeout')),ms||8000))])}

  let art=null;
  try{
    showSkeleton();
    if(typeof PAAPI.getArticlePublic==='function'){
      try{art=await withTimeout(PAAPI.getArticlePublic(id),5000)}catch(e){console.warn('[noticia] json-first',e)}
    }else if(typeof PAAPI.fetchArticleFromJson==='function'){
      try{art=await withTimeout(PAAPI.fetchArticleFromJson(id),5000)}catch(e){console.warn('[noticia] json',e)}
    }
    if(!art&&PAStore.findArticleLocal)art=PAStore.findArticleLocal(id);
    if(!art||art.status!=='pub'){
      try{
        await withTimeout(PAStore.init(),6000);
        art=PAStore.getArticle(id)||art;
      }catch(err){console.warn('[noticia] store',err)}
    }
    if((!art||art.status!=='pub')&&typeof PAAPI.getArticle==='function'){
      try{
        const loaded=await withTimeout(PAAPI.getArticle(id),5000);
        if(loaded)art=loaded;
      }catch(e){console.warn('[noticia] api',e)}
    }

    if(!art||art.status!=='pub'){
      main.innerHTML='<div class="not-found"><h1>Notícia não encontrada</h1><p>Esta matéria não está disponível ou foi removida.</p><a href="../index.html">Ir para a home</a></div>';
      return;
    }
  }catch(err){
    console.error('[noticia] load',err);
    showLoadError('Não foi possível carregar esta matéria. Verifique sua conexão e tente novamente.');
    return;
  }

  document.title=art.title+' – Pains Acontece';
  window.PACurrentArticle=art;
  if(typeof PAViewsTracker!=='undefined'){PAViewsTracker.trackView(id).then(r=>{if(r?.views)document.querySelectorAll('[data-pa-views]').forEach(el=>{el.textContent=Number(r.views).toLocaleString('pt-BR')})}).catch(()=>{})}
  else PAStore.incrementViews(id).catch(()=>{});

  let relatedPool=[];
  try{
    await withTimeout(PAStore.init(),5000);
    relatedPool=PAStore.getArticles('pub');
  }catch(e){console.warn('[noticia] related init',e)}
  if(!relatedPool.length&&typeof PAAPI.getArticlesPublic==='function'){
    try{relatedPool=await PAAPI.getArticlesPublic('pub')}catch(e){}
  }
  const related=relatedPool.filter(a=>String(a.id)!==String(art.id)&&a.cat===art.cat).slice(0,3);
  let quickText=art.quickLead||art.lead||art.title;
  if(quickText.length>400&&typeof PAArticleFormat!=='undefined'){
    quickText=PAArticleFormat.firstParagraph(quickText,380)||quickText.slice(0,377)+'…';
  }
  let currentMode=mode;

  function formatBody(html){
    if(!html)return '';
    if(typeof PAArticleFormat!=='undefined')return PAArticleFormat.reorganizeContent(html);
    return html;
  }

  function pubLabel(a){
    if(typeof PAScanner!=='undefined'&&PAScanner.formatPubLabel){
      let pd=a.pubISO?new Date(a.pubISO):null;
      if(!pd||isNaN(pd.getTime())){
        const p=(a.date||'').split('/');
        if(p.length===3)pd=new Date(+p[2],+p[1]-1,+p[0]);
      }
      if(pd&&!isNaN(pd.getTime()))return PAScanner.formatPubLabel(pd,a.pubISO);
    }
    return[a.date,a.timeAgo].filter(Boolean).join(' · ');
  }

  function readingTime(html){
    const plain=(html||'').replace(/<[^>]+>/g,' ');
    const words=plain.trim().split(/\s+/).filter(Boolean).length;
    return Math.max(1,Math.ceil(words/200))+' min de leitura';
  }

  function catClass(cat){
    const c=(cat||'').toLowerCase();
    if(c.includes('políc')||c.includes('polic'))return 'cat-policia';
    if(c.includes('polít')||c.includes('polit'))return 'cat-politica';
    if(c.includes('saúd')||c.includes('saud'))return 'cat-saude';
    if(c.includes('pains'))return 'cat-pains';
    return '';
  }

  function authorInitial(name){return esc((name||'R')[0].toUpperCase())}

  document.body.classList.add(catClass(art.cat));

  function bindProgress(){
    const bar=document.getElementById('readProgress');
    const topBar=document.getElementById('topBar');
    const fab=document.getElementById('artFab');
    if(!bar)return;
    const onScroll=()=>{
      const h=document.documentElement.scrollHeight-window.innerHeight;
      bar.style.width=h>0?(window.scrollY/h*100)+'%':'0%';
      if(topBar)topBar.classList.toggle('scrolled',window.scrollY>60);
      if(fab)fab.classList.toggle('visible',window.scrollY>400);
    };
    window.addEventListener('scroll',onScroll,{passive:true});
    onScroll();
  }

  function bindTOC(){
    const links=document.querySelectorAll('.aside-toc a');
    const heads=[...document.querySelectorAll('.content h3.art-subhead')];
    if(!links.length||!heads.length)return;
    const onScroll=()=>{
      let active=null;
      for(const h of heads){
        if(h.getBoundingClientRect().top<=120)active=h.id;
      }
      links.forEach(a=>a.classList.toggle('active',a.getAttribute('href')==='#'+active));
    };
    window.addEventListener('scroll',onScroll,{passive:true});
    onScroll();
  }

  function switchMode(newMode){
    if(newMode===currentMode)return;
    currentMode=newMode;
    history.replaceState(null,'',`noticia.html?id=${id}&mode=${currentMode}`);
    document.querySelectorAll('.mode-tab').forEach(t=>{
      t.classList.toggle('active',t.dataset.mode===currentMode);
      t.classList.toggle('quick',t.dataset.mode==='quick');
    });
    document.querySelectorAll('.mode-panel').forEach(p=>{
      p.classList.toggle('active',p.dataset.mode===currentMode);
    });
    const lead=document.querySelector('.lead');
    if(lead)lead.style.display=currentMode==='quick'?'none':'';
    initReveal(main);
  }

  function render(){
    try{
    const bodyRaw=formatBody(art.content||'');
    const bodyHtml=enhanceBody(bodyRaw);
    const toc=extractTOC(bodyHtml);
    const author=art.author||'Redação Pains Acontece';
    const sponsored=art.sponsored?'<span class="sponsored-badge reveal"><i class="fas fa-star"></i> Conteúdo Patrocinado</span>':'';
    const painsFb=(typeof PAPainsMedia!=='undefined')?PAPainsMedia.pick(art.cat):'';
    const heroImg=art.img||painsFb;
    const isYt=art.video&&/youtube\.com|youtu\.be/i.test(art.video);
    const heroMedia=art.video
      ?(isYt
        ?`<iframe src="${esc(art.video.includes('embed')?art.video:art.video.replace('watch?v=','embed/'))}" title="Vídeo" allowfullscreen loading="lazy" style="width:100%;height:100%;border:0"></iframe>`
        :`<video src="${esc(art.video)}" controls playsinline poster="${esc(heroImg)}"></video>`)
      :heroImg
        ?`<img src="${esc(heroImg)}" alt="" loading="eager" onerror="this.onerror=null;this.src='${esc(painsFb||'../assets/images/pains-acontece-logo.png')}'"/>`
        :`<img src="../assets/images/pains-acontece-logo.png" alt="Pains Acontece" loading="eager"/>`;

    const tocHtml=toc.length?`<div class="aside-card reveal"><h5><i class="fas fa-list-ul"></i> Nesta matéria</h5>
      <ul class="aside-toc">${toc.map(t=>`<li><a href="#${esc(t.id)}">${esc(t.text)}</a></li>`).join('')}</ul></div>`:'';

    const miniRel=related.length?`<div class="aside-card reveal reveal-delay-1"><h5><i class="fas fa-newspaper"></i> Leia também</h5>
      <div class="aside-mini-rel">${related.map(r=>`
        <a href="noticia.html?id=${r.id}"><img src="${esc(r.img)}" alt=""/><span>${esc(r.title)}</span></a>`).join('')}
      </div></div>`:'';

    const dateLabel=(art.date||'').trim()||pubLabel(art).split('·')[0]?.trim()||'';

    main.innerHTML=`
    <div class="article art-loaded">
    <div class="wrap">
    <section class="art-hero-img">
      <div class="hero-frame">${heroMedia}</div>
      <div class="hero-accent"></div>
    </section>
    <header class="art-top">
      ${sponsored}
      <nav class="art-breadcrumb"><a href="../index.html">Home</a><i class="fas fa-chevron-right" style="font-size:.5rem"></i><span>${esc(art.cat)}</span></nav>
      <div class="art-top-row">
        <span class="cat">${esc(art.cat)}</span>
        ${dateLabel?`<span class="art-date"><i class="far fa-calendar-alt"></i> ${esc(dateLabel)}</span>`:''}
      </div>
      <h1 class="art-title">${esc(art.title)}</h1>
      <div class="meta-chips">
        <span class="meta-chip"><i class="fas fa-clock"></i> ${readingTime(art.content)}</span>
        <span class="meta-chip"><i class="fas fa-eye"></i> <span data-pa-views="${esc(String(art.id))}">${Number(art.views||0).toLocaleString('pt-BR')}</span> leituras</span>
        ${art.verified?'<span class="meta-chip verified"><i class="fas fa-check-circle"></i> Verificada pela IA</span>':''}
      </div>
    </header>
    <div class="article-layout">
    <article class="article-main">
      <header class="art-header">
        ${art.lead?`<p class="lead reveal" style="${currentMode==='quick'?'display:none':''}">${esc(art.lead)}</p>`:''}
        <div class="author-card reveal reveal-delay-1">
          <div class="author-av">${authorInitial(author)}</div>
          <div class="author-info">
            <strong>${esc(author)}</strong>
            <span>${esc(pubLabel(art))}</span>
          </div>
        </div>
      </header>
      <div class="mode-tabs reveal reveal-delay-3">
        <button type="button" class="mode-tab quick ${currentMode==='quick'?'active':''}" data-mode="quick"><i class="fas fa-bolt"></i> Notícia Rápida</button>
        <button type="button" class="mode-tab ${currentMode==='full'?'active':''}" data-mode="full"><i class="fas fa-file-alt"></i> Matéria Completa</button>
      </div>
      <div class="mode-panels">
        <div class="mode-panel quick ${currentMode==='quick'?'active':''}" data-mode="quick">
          <div class="quick-box reveal">
            <div class="qlabel"><i class="fas fa-bolt"></i> Resumo explicativo</div>
            <p class="qtext">${esc(quickText)}</p>
            <p class="qctx">Versão resumida e explicativa. A matéria completa traz detalhes, fontes e verificação da IA.</p>
          </div>
        </div>
        <div class="mode-panel full ${currentMode==='full'?'active':''}" data-mode="full">
          <div class="content">${bodyHtml}</div>
        </div>
      </div>
      <div class="share reveal">
        <h4><i class="fas fa-share-alt"></i> Compartilhar matéria</h4>
        <div class="share-btns">
          <a class="wa" href="https://wa.me/?text=${encodeURIComponent(art.title+' - Pains Acontece '+location.href)}" target="_blank" rel="noopener"><i class="fab fa-whatsapp"></i><span>WhatsApp</span></a>
          <a class="fb" href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(location.href)}" target="_blank" rel="noopener"><i class="fab fa-facebook-f"></i><span>Facebook</span></a>
          <a class="x" href="https://twitter.com/intent/tweet?text=${encodeURIComponent(art.title)}&url=${encodeURIComponent(location.href)}" target="_blank" rel="noopener"><i class="fab fa-x-twitter"></i><span>X</span></a>
          <a class="cp" href="#" id="btnCopyLink"><i class="fas fa-link"></i><span>Copiar link</span></a>
        </div>
      </div>
      <div id="paSocialMount" class="reveal"></div>
      ${related.length?`<div class="related reveal"><h3>Notícias Relacionadas</h3><div class="rel-grid">${related.map((r,i)=>`
        <a href="noticia.html?id=${r.id}" class="rel-card reveal reveal-delay-${(i%4)+1}"><img src="${esc(r.img)}" alt=""/><div class="body"><h4>${esc(r.title)}</h4><div class="rel-cat">${esc(r.cat)}</div></div></a>`).join('')}</div></div>`:''}
    </article>
    <aside class="article-aside">
      ${tocHtml}
      <div id="adArticleSidebar"></div>
      ${miniRel}
    </aside>
    </div></div></div>`;

    try{if(typeof PAAds!=='undefined')PAAds.renderSidebar('adArticleSidebar')}catch(e){console.warn('[noticia] ads',e)}
    main.querySelectorAll('.mode-tab').forEach(btn=>{
      btn.addEventListener('click',()=>switchMode(btn.dataset.mode));
    });
    document.getElementById('btnCopyLink')?.addEventListener('click',e=>{
      e.preventDefault();
      navigator.clipboard.writeText(location.href).then(()=>{
        if(typeof PADialog!=='undefined')PADialog.toast('Link copiado!','success');
      }).catch(()=>PADialog?.alert?.({message:'Não foi possível copiar o link.',variant:'warning'}));
    });
    document.getElementById('fabShare')?.addEventListener('click',()=>{
      document.querySelector('.share')?.scrollIntoView({behavior:'smooth',block:'center'});
    });
    document.getElementById('fabTop')?.addEventListener('click',()=>{
      window.scrollTo({top:0,behavior:'smooth'});
    });
    try{
      const socialMount=document.getElementById('paSocialMount');
      if(socialMount&&typeof PASocialWidget!=='undefined')PASocialWidget.mount(socialMount,id);
    }catch(e){console.warn('[noticia] social',e)}
    bindProgress();
    bindTOC();
    initReveal(main);
    }catch(err){
      console.error('[noticia] render',err);
      showLoadError('Erro ao montar a página desta matéria.');
    }
  }

  try{PAUserNav.init('#paUserNav')}catch(e){console.warn('[noticia] nav',e)}
  document.getElementById('btnTopIA')?.addEventListener('click',()=>{
    if(typeof PAPublicIA!=='undefined')PAPublicIA.openAssistant();
    else if(typeof PADialog!=='undefined')PADialog.toast('Equipe IA carregando…','info');
  });
  render();
  if(typeof PAPublicIA!=='undefined'){
    if(!document.getElementById('papiaPanel'))PAPublicIA.init();
    PAPublicIA.refreshForArticle();
  }
})();
</script>
</body>
</html>
